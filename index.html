<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سوبر آبل | نظام إدارة الفريق</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#F7F6F3;
    --surface:#FFFFFF;
    --surface-2:#FAF9F6;
    --border:#E9E5DC;
    --primary:#201C1D;
    --primary-dark:#000000;
    --primary-tint:#FFF3D6;
    --accent:#FDB92A;
    --accent-tint:#FFF6E0;
    --success:#1FAE7A;
    --success-tint:#E4F7EF;
    --warning:#D9791A;
    --warning-tint:#FCEEDB;
    --danger:#E5484D;
    --danger-tint:#FDEBEC;
    --text:#201C1D;
    --text-muted:#6B6660;
    --text-faint:#A29C92;
    --radius:16px;
    --radius-sm:10px;
    --shadow: 0 1px 2px rgba(20,15,10,0.05), 0 8px 24px rgba(20,15,10,0.07);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);}
  #app{min-height:100vh;}
  h1,h2,h3,h4{margin:0;font-weight:800;}
  p{margin:0;}
  button{font-family:inherit;cursor:pointer;border:none;}
  input,select,textarea{font-family:inherit;}
  ::selection{background:var(--primary-tint);}

  /* ---------- shared / auth screens ---------- */
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:
    radial-gradient(circle at 15% 20%, rgba(32,28,29,0.06), transparent 45%),
    radial-gradient(circle at 85% 80%, rgba(253,185,42,0.16), transparent 45%),
    var(--bg);}
  .auth-card{width:100%;max-width:420px;background:var(--surface);border-radius:20px;box-shadow:var(--shadow);padding:36px 32px;border:1px solid var(--border);}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
  .brand-mark{width:38px;height:38px;flex:none;display:flex;align-items:center;justify-content:center;}
  .brand-mark img{width:100%;height:100%;object-fit:contain;}
  .brand-name{font-size:15.5px;font-weight:800;}
  .brand-name span{color:var(--primary);}
  .brand-tagline{font-size:10.5px;color:var(--text-faint);margin-top:1px;}
  .sidebar .brand-tagline{color:rgba(255,255,255,0.4);}
  .auth-title{font-size:20px;margin-bottom:4px;}
  .auth-sub{color:var(--text-muted);font-size:12.5px;margin-bottom:20px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:6px;}
  .field input, .field select{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface-2);font-size:14.5px;outline:none;transition:.15s;color:var(--text);}
  .field input:focus, .field select:focus{border-color:var(--primary);background:#fff;}
  .btn{padding:12px 18px;border-radius:var(--radius-sm);font-weight:700;font-size:14.5px;transition:.15s;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
  .btn-primary{background:var(--primary);color:#fff;width:100%;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-ghost{background:transparent;color:var(--text-muted);border:1.5px solid var(--border);}
  .btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
  .btn-sm{padding:8px 12px;font-size:13px;}
  .btn-danger{background:var(--danger-tint);color:var(--danger);}
  .auth-error{background:var(--danger-tint);color:var(--danger);padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:14px;font-weight:600;}
  .auth-note{margin-top:18px;font-size:12.5px;color:var(--text-faint);line-height:1.9;background:var(--surface-2);padding:12px 14px;border-radius:var(--radius-sm);}

  /* ---------- app shell ---------- */
  .shell{display:flex;min-height:100vh;position:relative;}
  .mobile-topbar{display:none;}
  .mobile-overlay{display:none;}
  .sidebar{width:252px;flex:none;background:#17130E;padding:22px 16px;display:flex;flex-direction:column;}
  .sidebar .brand{padding:0 6px;margin-bottom:24px;}
  .sidebar .brand-name{color:#fff;}
  .sidebar .brand-name span{color:var(--accent);}
  .nav-item{display:flex;align-items:center;gap:11px;padding:11px 14px;border-radius:12px;color:rgba(255,255,255,0.6);font-weight:700;font-size:13.5px;margin-bottom:3px;background:transparent;width:100%;text-align:right;transition:.15s;}
  .nav-item:hover{background:rgba(255,255,255,0.06);color:#fff;}
  .nav-item.active{background:var(--accent);color:#1A1408;}
  .nav-icon{display:flex;align-items:center;justify-content:center;flex:none;opacity:.95;}
  .nav-dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.5;flex:none;}
  .sidebar-foot{margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,0.1);}
  .user-chip{display:flex;align-items:center;gap:10px;padding:12px;background:rgba(255,255,255,0.05);border-radius:14px;margin-bottom:10px;}
  .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;flex:none;}
  .user-chip-name{font-size:13.5px;font-weight:700;color:#fff;}
  .user-chip-role{font-size:11px;color:var(--accent);margin-top:1px;}
  .sidebar .btn-ghost{color:rgba(255,255,255,0.55);border-color:rgba(255,255,255,0.15);}
  .sidebar .btn-ghost:hover{color:var(--accent);border-color:var(--accent);}

  .main{flex:1;padding:20px 26px;max-width:calc(100vw - 252px);}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:14px;}
  .page-title{font-size:18px;}
  .page-sub{color:var(--text-muted);font-size:12px;margin-top:3px;}
  .topbar-actions{display:flex;align-items:center;gap:10px;flex:none;}
  .bell-btn{position:relative;width:40px;height:40px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:17px;}
  .bell-dot{position:absolute;top:8px;left:9px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--surface);}

  .grid{display:grid;gap:16px;}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-2{grid-template-columns:2fr 1fr;}
  @media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr);}.grid-2{grid-template-columns:1fr;}}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px;box-shadow:var(--shadow);}
  .stat-card{padding:14px 16px;}
  .stat-label{font-size:11.5px;color:var(--text-muted);font-weight:700;margin-bottom:6px;}
  .stat-value{font-size:21px;font-weight:800;}
  .stat-sub{font-size:11px;color:var(--text-faint);margin-top:5px;}

  .stat-card-v2{display:flex;flex-direction:column;gap:12px;}
  .stat-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex:none;}
  .stat-trend{font-size:11.5px;font-weight:700;display:inline-flex;align-items:center;gap:3px;}
  .stat-trend.up{color:var(--success);}
  .stat-trend.down{color:var(--danger);}

  .kanban-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start;}
  @media(max-width:1100px){.kanban-wrap{grid-template-columns:1fr;}}
  .kanban-col{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);}
  .kanban-col-head{padding:10px 12px;font-weight:800;font-size:12.5px;display:flex;align-items:center;justify-content:space-between;}
  .kanban-col-body{padding:10px;background:var(--surface-2);min-height:60px;max-height:420px;overflow-y:auto;}
  .kanban-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:9px;}
  .kanban-card-title{font-weight:700;font-size:12px;margin-bottom:5px;line-height:1.5;}
  .kanban-card-meta{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text-faint);}

  .activity-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
  .activity-item:last-child{border-bottom:none;}
  .activity-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);margin-top:6px;flex:none;}
  .activity-text{font-size:13px;line-height:1.6;}
  .activity-time{font-size:11px;color:var(--text-faint);margin-top:2px;}

  .section-title{font-size:13.5px;font-weight:800;margin-bottom:11px;display:flex;align-items:center;justify-content:space-between;}
  .subtab-nav{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
  .subtab-btn{padding:8px 16px;border-radius:100px;font-size:12.5px;font-weight:700;background:var(--surface);border:1.5px solid var(--border);color:var(--text-muted);}
  .subtab-btn:hover{border-color:var(--accent);color:var(--text);}
  .subtab-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}

  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th{text-align:right;color:var(--text-muted);font-weight:700;font-size:11px;padding:7px 9px;border-bottom:1.5px solid var(--border);}
  td{padding:9px 9px;border-bottom:1px solid var(--border);}
  tr:last-child td{border-bottom:none;}

  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:100px;font-size:10.5px;font-weight:700;}
  .badge-success{background:var(--success-tint);color:var(--success);}
  .badge-warning{background:var(--warning-tint);color:var(--warning);}
  .badge-danger{background:var(--danger-tint);color:var(--danger);}
  .badge-primary{background:var(--primary-tint);color:var(--primary);}
  .badge-muted{background:var(--surface-2);color:var(--text-muted);}

  .task-card{border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px;background:var(--surface-2);}
  .task-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .task-title{font-weight:800;font-size:13px;margin-bottom:4px;}
  .task-desc{font-size:12px;color:var(--text-muted);margin-bottom:9px;line-height:1.6;}
  .task-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:11.5px;color:var(--text-faint);align-items:center;}
  .assignee-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-top:1px dashed var(--border);font-size:13px;}
  .check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);flex:none;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .check.done{background:var(--success);border-color:var(--success);color:#fff;}

  .modal-bg{position:fixed;inset:0;background:rgba(20,15,40,0.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal{background:#fff;border-radius:18px;padding:26px;width:100%;max-width:480px;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);}
  .modal-title{font-size:15px;margin-bottom:14px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .chip-select{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface-2);}
  .chip{padding:6px 12px;border-radius:100px;font-size:12.5px;font-weight:700;background:#fff;border:1.5px solid var(--border);color:var(--text-muted);}
  .chip.sel{background:var(--primary);color:#fff;border-color:var(--primary);}
  .modal-actions{display:flex;gap:10px;margin-top:18px;}

  .notif-item{display:flex;gap:12px;padding:12px 6px;border-bottom:1px solid var(--border);}
  .notif-icon{width:34px;height:34px;border-radius:10px;background:var(--primary-tint);color:var(--primary);display:flex;align-items:center;justify-content:center;flex:none;font-size:15px;}
  .notif-text{font-size:13.5px;line-height:1.6;}
  .notif-time{font-size:11px;color:var(--text-faint);margin-top:2px;}

  .whatsapp-banner{display:flex;gap:10px;align-items:flex-start;background:var(--success-tint);border:1px solid rgba(31,174,122,0.25);padding:12px 14px;border-radius:var(--radius-sm);font-size:12.5px;color:#146B4D;line-height:1.8;margin-bottom:18px;}
  .empty{text-align:center;padding:40px 20px;color:var(--text-faint);font-size:13.5px;}
  .attend-btn{padding:16px;border-radius:var(--radius);width:100%;font-size:15px;font-weight:800;}
  .fingerprint-circle{width:120px;height:120px;border-radius:50%;border:2.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;margin:18px auto;background:var(--surface-2);transition:.15s;color:var(--text-muted);}
  .fingerprint-circle:hover{border-color:var(--accent);color:var(--accent);transform:scale(1.02);}
  .fingerprint-circle:disabled{opacity:.6;cursor:wait;}
  .welcome-panel{background:var(--surface-2);border-radius:var(--radius-sm);padding:13px 15px;margin-bottom:14px;font-size:12.5px;}
  .welcome-panel b{font-size:14px;}
  .combo-dropdown{position:absolute;top:100%;right:0;left:0;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);margin-top:4px;max-height:180px;overflow-y:auto;box-shadow:var(--shadow);z-index:30;display:none;}
  .combo-dropdown.show{display:block;}
  .combo-item{padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:1px solid var(--border);}
  .combo-item:last-child{border-bottom:none;}
  .combo-item:hover, .combo-item.hl{background:var(--accent-tint);color:var(--primary);}
  .combo-item-new{color:var(--accent);}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:12px 20px;border-radius:100px;font-size:13.5px;font-weight:600;z-index:100;box-shadow:var(--shadow);}
  .rank-pill{width:26px;height:26px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:var(--text-muted);}

  /* ===== موبايل: قائمة منسدلة بدل السايدبار الثابت ===== */
  @media(max-width:860px){
    .shell{flex-direction:column;}
    .mobile-topbar{display:flex;align-items:center;justify-content:space-between;background:#17130E;padding:12px 16px;position:sticky;top:0;z-index:60;}
    .mobile-topbar .brand{margin-bottom:0;}
    .mobile-topbar .brand-name{color:#fff;font-size:14px;}
    .mobile-topbar .brand-name span{color:var(--accent);}
    .mobile-topbar .brand-tagline{display:none;}
    .hamburger-btn{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,0.08);color:#fff;display:flex;align-items:center;justify-content:center;flex:none;font-size:18px;}
    .sidebar{position:fixed;top:0;right:0;height:100vh;width:78vw;max-width:300px;z-index:80;transform:translateX(100%);transition:transform .25s ease;box-shadow:-8px 0 24px rgba(0,0,0,0.25);}
    .sidebar.mobile-open{transform:translateX(0);}
    .sidebar .brand{display:none;}
    .mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:70;}
    .mobile-overlay.show{display:block;}
    .main{max-width:100%;width:100%;padding:16px;}
    .topbar{flex-wrap:wrap;gap:10px;}
    .page-title{font-size:16px;}
    .grid-4{grid-template-columns:repeat(2,1fr);}
    .grid-3{grid-template-columns:1fr;}
    .grid-2{grid-template-columns:1fr;}
    .kanban-wrap{grid-template-columns:1fr;}
    table{font-size:11.5px;}
    th, td{padding:7px 6px;}
    .modal{max-width:94vw;padding:20px;}
    .task-meta{gap:6px;}
    .card{padding:13px;}
    .fingerprint-circle{width:100px;height:100px;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =========================================================
   SUPER APPLE — TEAM MANAGEMENT SYSTEM
   Data is stored in a real MySQL database via the PHP API
   in api/index.php (see api/config.php for DB credentials).
   ========================================================= */

const API = 'api/index.php';

let state = {
  users: [], tasks: [], attendance: [], points: [], notifications: [], settings: null,
  clients: [], leaveRequests: [], departments: [],
  currentUser: null, hasUsers: false, loading: true, loginError: '', fatalError: null,
  adminTab: 'dashboard', empTab: 'dashboard', reportsTab: 'overview', reportFilter: { preset: 'thisMonth', from: '', to: '' },
  taskModal: false, empModal: false, clientModal: false, departmentModal: false, scheduleModal: null, leaveModal: false, checkingIn: false, mobileMenuOpen: false, toast: null
};
const DEFAULT_SETTINGS = { workStart:'08:00', graceMinutes:15, pointsOnTime:20, pointsEarlyBonus:10, earlyBonusHours:24, pointsAttendance:5, penaltyLate:5, penaltyAbsent:10, whatsappPhoneId:'', whatsappToken:'', whatsappTemplate:'hello_world' };

async function apiGet(action){
  try{
    const res = await fetch(`${API}?action=${action}`, { credentials:'same-origin' });
    return await res.json();
  }catch(e){ return { error: 'تعذر الاتصال بالسيرفر' }; }
}
async function apiPost(action, body){
  try{
    const res = await fetch(`${API}?action=${action}`, {
      method:'POST', credentials:'same-origin',
      headers:{'Content-Type':'application/json'}, body: JSON.stringify(body||{})
    });
    return await res.json();
  }catch(e){ return { error: 'تعذر الاتصال بالسيرفر' }; }
}

async function init(){
  const data = await apiGet('bootstrap');
  if(data.error){ state.loading=false; state.fatalError = data.error; render(); return; }
  applyBootstrap(data);
  state.loading = false;
  render();
}
async function refresh(){
  const data = await apiGet('bootstrap');
  if(data.error){ state.fatalError = data.error; render(); return; }
  applyBootstrap(data);
  render();
}
function applyBootstrap(data){
  state.hasUsers = !!data.hasUsers;
  state.currentUser = data.currentUser || null;
  state.settings = data.settings || DEFAULT_SETTINGS;
  state.users = data.users || [];
  state.clients = data.clients || [];
  state.departments = data.departments || [];
  state.leaveRequests = data.leaveRequests || [];
  state.tasks = (data.tasks || []).map(t => ({ ...t, assignees: (t.assignees||[]).map(a => ({ ...a, done: !!a.done })) }));
  state.attendance = data.attendance || [];
  state.points = (data.points || []).map(p => ({ ...p, points: Number(p.points) }));
  state.notifications = data.notifications || [];
}

function uid(p){ return p + '_' + Math.random().toString(36).slice(2,9); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function nowTime(){ const d=new Date(); return d.toTimeString().slice(0,5); }
function fmtDate(d){ return new Date(d).toLocaleDateString('ar-EG',{day:'numeric',month:'short'}); }
function fmtDateTime(d){ return new Date(d).toLocaleString('ar-EG',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }
function timeAgo(d){
  const diff = Math.floor((new Date() - new Date(d))/1000);
  if(diff < 60) return 'الآن';
  if(diff < 3600) return `قبل ${Math.floor(diff/60)} دقيقة`;
  if(diff < 86400) return `قبل ${Math.floor(diff/3600)} ساعة`;
  return `قبل ${Math.floor(diff/86400)} يوم`;
}
function showToast(msg){ state.toast = msg; render(); setTimeout(()=>{ state.toast=null; render(); }, 2600); }

function userPoints(userId){
  return state.points.filter(p=>p.userId===userId).reduce((s,p)=>s+p.points,0);
}

/* ---------------- AUTH ---------------- */
async function handleLogin(e){
  e.preventDefault();
  const email = e.target.email.value.trim();
  const pass = e.target.password.value;
  const res = await apiPost('login', { email, password: pass });
  if(res.error){ state.loginError = 'البريد الإلكتروني أو كلمة السر غير صحيحة'; render(); return; }
  state.loginError = '';
  await refresh();
}
async function handleLogout(){
  await apiPost('logout', {});
  state.currentUser = null; render();
}

async function handleSetupAdmin(e){
  e.preventDefault();
  const f = e.target;
  const res = await apiPost('setupAdmin', { name: f.name.value.trim(), email: f.email.value.trim(), password: f.password.value });
  if(res.error){ showToast(res.error); return; }
  await refresh();
}

/* ---------------- EMPLOYEES (admin) ---------------- */
async function handleAddEmployee(e){
  e.preventDefault();
  const f = e.target;
  const res = await apiPost('addEmployee', {
    name: f.name.value.trim(), email: f.email.value.trim(), password: f.password.value,
    department: f.department.value.trim(), workStart: f.workStart.value, workEnd: f.workEnd.value, phone: f.phone.value.trim()
  });
  if(res.error){ showToast(res.error); return; }
  state.empModal = false;
  await refresh();
  showToast('تمت إضافة الموظف بنجاح');
}
async function handleRemoveEmployee(id){
  await apiPost('removeEmployee', { id });
  await refresh();
  showToast('تم حذف الموظف');
}
async function handleUpdateSchedule(e){
  e.preventDefault();
  const f = e.target;

/* ---------------- WEBAUTHN (بصمة/Face ID حقيقية) ---------------- */
function webauthnSupported(){
  return !!(window.PublicKeyCredential && navigator.credentials);
}
function b64urlToBuffer(b64url){
  const pad = '='.repeat((4 - b64url.length % 4) % 4);
  const base64 = (b64url + pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw = atob(base64);
  const buf = new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) buf[i] = raw.charCodeAt(i);
  return buf.buffer;
}
function bufferToB64url(buf){
  const bytes = new Uint8Array(buf);
  let str = '';
  for(let i=0;i<bytes.length;i++) str += String.fromCharCode(bytes[i]);
  return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

async function registerBiometric(){
  if(!webauthnSupported()){ showToast('جهازك أو متصفحك لا يدعم البصمة الرقمية'); return; }
  try{
    const startRes = await apiPost('webauthnRegisterStart', {});
    if(startRes.error){ showToast(startRes.error); return; }
    const pk = startRes.publicKey;
    pk.challenge = b64urlToBuffer(pk.challenge);
    pk.user.id = b64urlToBuffer(pk.user.id);
    if(pk.excludeCredentials) pk.excludeCredentials.forEach(c => c.id = b64urlToBuffer(c.id));

    const cred = await navigator.credentials.create({ publicKey: pk });

    const finishRes = await apiPost('webauthnRegisterFinish', {
      clientDataJSON: bufferToB64url(cred.response.clientDataJSON),
      attestationObject: bufferToB64url(cred.response.attestationObject)
    });
    if(finishRes.error){ showToast(finishRes.error); return; }
    showToast('تم تفعيل البصمة الرقمية بنجاح 🔒');
    await refresh();
  }catch(e){
    showToast('تم إلغاء تفعيل البصمة أو حصل خطأ');
  }
}

async function verifyBiometricAndAttend(){
  if(!webauthnSupported()){ showToast('جهازك لا يدعم البصمة، استخدم زر الموقع العادي'); return; }
  state.checkingIn = true; render();
  try{
    const startRes = await apiPost('webauthnAuthStart', {});
    if(startRes.error){ state.checkingIn=false; render(); showToast(startRes.error); return; }
    const pk = startRes.publicKey;
    pk.challenge = b64urlToBuffer(pk.challenge);
    if(pk.allowCredentials) pk.allowCredentials.forEach(c => c.id = b64urlToBuffer(c.id));

    const assertion = await navigator.credentials.get({ publicKey: pk });
    const coords = await getGeoCoords();

    const res = await apiPost('webauthnAttendance', {
      id: bufferToB64url(assertion.rawId),
      clientDataJSON: bufferToB64url(assertion.response.clientDataJSON),
      authenticatorData: bufferToB64url(assertion.response.authenticatorData),
      signature: bufferToB64url(assertion.response.signature),
      lat: coords?.lat, lng: coords?.lng
    });
    state.checkingIn = false;
    if(res.error){ showToast(res.error); return; }
    showToast('تم التحقق بالبصمة وتسجيل دوامك ✅');
    await refresh();
  }catch(e){
    state.checkingIn = false; render();
    showToast('تم إلغاء التحقق بالبصمة');
  }
}

/* ---------------- DERIVED / REPORTS ---------------- */
function computeReport(userId, from, to){
  const att = state.attendance.filter(a=>a.userId===userId && a.date>=from && a.date<=to);
  const present = att.filter(a=>a.status==='present').length;
  const late = att.filter(a=>a.status==='late').length;
  const absent = att.filter(a=>a.status==='absent').length;
  const myTasks = state.tasks.filter(t=>t.assignees.some(a=>a.userId===userId));
  const doneOnAssignee = t=>t.assignees.find(a=>a.userId===userId).done;
  const completedInRange = myTasks.filter(t=>{
    const a = t.assignees.find(a=>a.userId===userId);
    return a.done && a.completedAt && a.completedAt.slice(0,10)>=from && a.completedAt.slice(0,10)<=to;
  }).length;
  const late_tasks = myTasks.filter(t=> !doneOnAssignee(t) && t.deadline && new Date(t.deadline)<new Date()).length;
  const pts = state.points.filter(p=>p.userId===userId && p.date.slice(0,10)>=from && p.date.slice(0,10)<=to).reduce((s,p)=>s+p.points,0);
  const u = state.users.find(u=>u.id===userId);
  const daysWithHours = att.filter(a=>a.checkIn && a.checkOut);
  const totalHours = Math.round(daysWithHours.reduce((s,a)=>s+(hoursDiff(a.checkIn,a.checkOut)||0),0)*10)/10;
  const requiredHours = Math.round((present+late) * expectedHours(u) * 10)/10;
  return { present, late, absent, totalTasks: myTasks.length, completed: completedInRange, late_tasks, points: pts, totalHours, requiredHours };
}
function thisMonthRange(){
  const d = new Date(); const y=d.getFullYear(), m=d.getMonth();
  const start = new Date(y,m,1).toISOString().slice(0,10);
  return { from: start, to: todayStr() };
}
function monthlyReport(userId){
  const {from,to} = thisMonthRange();
  return computeReport(userId, from, to);
}
function reportRangeFor(filter){
  const now = new Date();
  if(filter.preset==='today') return { from: todayStr(), to: todayStr() };
  if(filter.preset==='thisMonth') return thisMonthRange();
  if(filter.preset==='lastMonth'){
    const y=now.getFullYear(), m=now.getMonth();
    const start = new Date(y, m-1, 1).toISOString().slice(0,10);
    const end = new Date(y, m, 0).toISOString().slice(0,10);
    return { from:start, to:end };
  }
  return { from: filter.from || todayStr(), to: filter.to || todayStr() };
}
function leaderboard(){
  return state.users.filter(u=>u.role==='employee').map(u=>({u, pts: userPoints(u.id)})).sort((a,b)=>b.pts-a.pts);

function monthlyCompletionSeries(){
  const months = [];
  const now = new Date();
  for(let i=5;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push({label: d.toLocaleDateString('ar-EG',{month:'short'}), year: d.getFullYear(), month: d.getMonth()});
  }
  const data = months.map(m=>{
    let count = 0;
    state.tasks.forEach(t=>{
      if(t.assignees.some(a=>a.completedAt && new Date(a.completedAt).getFullYear()===m.year && new Date(a.completedAt).getMonth()===m.month)) count++;
    });
    return count;
  });
  return { labels: months.map(m=>m.label), data };
}

function weeklyProductivitySeries(){
  const days = [];
  for(let i=6;i>=0;i--){ const d = new Date(); d.setDate(d.getDate()-i); days.push(d); }
  const toKey = d => d.toISOString().slice(0,10);
  const labels = days.map(d=>d.toLocaleDateString('ar-EG',{weekday:'short'}));
  const created = days.map(d=>{
    const k = toKey(d);
    return state.tasks.filter(t=>t.createdAt && t.createdAt.slice(0,10)===k).length;
  });
  const completed = days.map(d=>{
    const k = toKey(d);
    return state.tasks.filter(t=>t.assignees.some(a=>a.completedAt && a.completedAt.slice(0,10)===k)).length;
  });
  return { labels, created, completed };
}

function adminDashboard(){

  const noRecord = employees.length - todayRecs.length;

  const now = new Date();

  const doneTasks = state.tasks.filter(t=>taskStatus(t)==='done');

  const doneThisWeek = doneTasks.filter(t=>t.assignees.some(a=>a.completedAt && new Date(a.completedAt)>=weekAgo)).length;

    const pct = Math.round(((curr-prev)/prev)*100);
    return pct>=0 ? {dir:'up', text:`+${pct}%`} : {dir:'down', text:`${pct}%`};
  };
  const tTrend = trend(doneThisWeek, doneLastWeek);

function hoursDiff(t1, t2){
  if(!t1 || !t2) return null;
  const [h1,m1] = t1.split(':').map(Number);
  const [h2,m2] = t2.split(':').map(Number);
  return Math.round(((h2*60+m2)-(h1*60+m1))/6)/10;
}
function expectedHours(u){
  return hoursDiff(u?.workStart||'08:00', u?.workEnd||'16:00') || 8;
}

  const dates = [...new Set(state.attendance.map(a=>a.date))].sort().reverse().slice(0,14);
  const leaves = state.leaveRequests || [];
  const pending = leaves.filter(l=>l.status==='pending');
  const reviewed = leaves.filter(l=>l.status!=='pending').slice(0,10);
  const leaveStatusMap = {pending:['قيد المراجعة','badge-warning'], approved:['موافَق عليها','badge-success'], rejected:['مرفوضة','badge-danger']};
  return `

function reportsOverview(){
  const employees = state.users.filter(u=>u.role==='employee');
  const range = reportRangeFor(state.reportFilter);
  const start = new Date(range.from+'T00:00:00'), end = new Date(range.to+'T23:59:59');
  const doneTasks = state.tasks.filter(t=>taskStatus(t)==='done');
  const lateTasks = state.tasks.filter(t=>taskStatus(t)==='late');
  const completionRate = state.tasks.length ? Math.round((doneTasks.length/state.tasks.length)*100) : 0;
  const monthPoints = state.points.filter(p=>new Date(p.date)>=start && new Date(p.date)<=end);
  const pointsIssued = monthPoints.filter(p=>p.points>0).reduce((s,p)=>s+p.points,0);
  const pointsDeducted = monthPoints.filter(p=>p.points<0).reduce((s,p)=>s+p.points,0);
  const totalHours = employees.reduce((s,e)=>s+computeReport(e.id, range.from, range.to).totalHours,0);
  const requiredHours = employees.reduce((s,e)=>s+computeReport(e.id, range.from, range.to).requiredHours,0);
  return `
  <div class="grid grid-4" style="margin-bottom:16px;">
    <div class="card stat-card"><div class="stat-label">عدد الموظفين</div><div class="stat-value">${employees.length}</div></div>
    <div class="card stat-card"><div class="stat-label">معدل إنجاز المهام</div><div class="stat-value" style="color:var(--success)">${completionRate}%</div></div>
    <div class="card stat-card"><div class="stat-label">مهام متأخرة حاليًا</div><div class="stat-value" style="color:var(--danger)">${lateTasks.length}</div></div>
    <div class="card stat-card"><div class="stat-label">ساعات العمل بالفترة المحددة</div><div class="stat-value" style="color:${totalHours>=requiredHours?'var(--success)':'var(--warning)'}">${Math.round(totalHours)}<span style="font-size:13px;color:var(--text-faint);">/${Math.round(requiredHours)}س</span></div></div>
  </div>
  <div class="grid grid-2">
    <div class="card">
      <div class="section-title">نقاط الفترة المحددة</div>
      <div class="assignee-row"><span>نقاط مكتسبة</span><b style="color:var(--success)">+${pointsIssued}</b></div>
      <div class="assignee-row"><span>نقاط مخصومة</span><b style="color:var(--danger)">${pointsDeducted}</b></div>
      <div class="assignee-row"><span>الصافي</span><b style="color:var(--primary)">${pointsIssued+pointsDeducted}</b></div>
    </div>
    <div class="card">
      <div class="section-title">حالة المهام</div>
      <div class="assignee-row"><span>مكتملة</span><span class="badge badge-success">${doneTasks.length}</span></div>
      <div class="assignee-row"><span>قيد التنفيذ</span><span class="badge badge-primary">${state.tasks.filter(t=>taskStatus(t)==='progress').length}</span></div>
      <div class="assignee-row"><span>متأخرة</span><span class="badge badge-danger">${lateTasks.length}</span></div>
    </div>
  </div>`;
}

      ${sidebarNav(nav, null, state.empTab)}
      <div class="sidebar-foot">
        <div class="user-chip"><div class="avatar">${state.currentUser.name[0]}</div>
          <div><div class="user-chip-name">${state.currentUser.name}</div><div class="user-chip-role">${state.currentUser.department}</div></div></div>
        <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:10px;" id="logoutBtn">تسجيل الخروج</button>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <div><h1 class="page-title">${empTitles()[state.empTab]}</h1><p class="page-sub">${empSubs()[state.empTab]}</p></div>
        ${notifBell()}
      </div>
      ${empTabContent()}
    </div>
  </div>
  ${state.leaveModal ? leaveModal() : ''}
  ${state.toast ? `<div class="toast">${state.toast}</div>` : ''}
  `;
}
function empTitles(){ return {dashboard:`أهلًا، ${state.currentUser.name.split(' ')[0]} 👋`, tasks:'مهامي', attendance:'دوامي وإجازاتي', points:'نقاطي وترتيبي', report:'تقريري الشهري', notifications:'الإشعارات'}; }
function empSubs(){ return {
  dashboard:'نظرة سريعة على يومك', tasks:'المهام المسندة لك بشكل فردي أو مشترك',
  attendance:'سجل حضورك وانصرافك، وطلب إجازة جديدة', points:'رصيدك من النقاط وترتيبك بين الفريق',
  report:'أداؤك خلال الشهر الحالي', notifications:'كل التنبيهات الخاصة بك'
}; }

function empTabContent(){
  switch(state.empTab){
    case 'dashboard': return empDashboard();
    case 'tasks': return empTasks();
    case 'attendance': return empAttendance();
    case 'points': return empPoints();
    case 'report': return empReport();
    case 'notifications': return notificationsList(false);
  }
}

function empDashboard(){
  const rec = todayRecord(state.currentUser.id);
  const myTasks = state.tasks.filter(t=>t.assignees.some(a=>a.userId===state.currentUser.id));
  const pending = myTasks.filter(t=>taskStatus(t)!=='done');
  return `
  <div class="grid grid-2">
    ${attendanceCard(rec)}
    <div class="card">
      <div class="stat-label">رصيد نقاطك</div>
      <div class="stat-value" style="color:var(--primary);font-size:34px;">${userPoints(state.currentUser.id)}</div>
      <div class="stat-sub">مهامك المعلّقة: ${pending.length}</div>
    </div>
  </div>
  <div class="card" style="margin-top:16px;">
    <div class="section-title">مهامي القادمة</div>
    ${pending.length===0?`<div class="empty">لا توجد مهام معلقة حاليًا 🎉</div>`:pending.slice(0,4).map(t=>taskCard(t,false)).join('')}
  </div>`;
}

const FINGERPRINT_SVG = `<svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a8 8 0 00-8 8c0 3 1 5 1 7"/><path d="M12 2a8 8 0 018 8c0 1.5-.2 2.8-.5 4"/><path d="M8 20c-1-2-2-4.5-2-8a6 6 0 0112 0c0 1 0 2-.3 3"/><path d="M12 20c-1.2-2-2-4.5-2-8a2 2 0 014 0c0 2.5-.5 4-1 5.5"/><path d="M16 20c.7-1.5 1.3-3.3 1.3-5.5"/></svg>`;

function attendanceCard(rec){
  const u = state.currentUser;
  const exp = expectedHours(u);
  const bioReady = webauthnSupported() && u.hasWebauthn;
  const bioSupported = webauthnSupported();
  let body;
  if(!rec){
    body = `
      <button class="fingerprint-circle" id="${bioReady?'bioAttendBtn':'checkInBtn'}" ${state.checkingIn?'disabled':''}>
        ${FINGERPRINT_SVG}
        <span style="font-size:10.5px;font-weight:700;">${state.checkingIn?'جارِ التحقق...':(bioReady?'اضغط للتحقق بالبصمة':'اضغط لتسجيل الحضور')}</span>
      </button>
      <div class="auth-error" style="margin-bottom:0;">لم تقم بتسجيل حضورك اليوم حتى الآن. يرجى الضغط فور بدء العمل الفعلي.</div>`;
  } else if(!rec.checkOut){
    body = `
      <div style="text-align:center;margin-bottom:6px;">${statusBadge(rec.status)} <span style="color:var(--text-muted);font-size:12.5px;">حضرت الساعة ${rec.checkIn}</span></div>
      <button class="fingerprint-circle" id="${bioReady?'bioAttendBtn':'checkOutBtn'}" style="border-color:var(--accent);color:var(--accent);" ${state.checkingIn?'disabled':''}>
        ${FINGERPRINT_SVG}
        <span style="font-size:10.5px;font-weight:700;">${state.checkingIn?'جارِ التحقق...':(bioReady?'اضغط للتحقق بالبصمة':'اضغط لتسجيل الانصراف')}</span>
      </button>`;
  } else {
    const worked = hoursDiff(rec.checkIn, rec.checkOut);
    body = `<div style="text-align:center;padding:14px 0;">
      <div style="font-size:36px;margin-bottom:6px;">✅</div>
      <div style="font-weight:800;font-size:13.5px;">تم تسجيل دوامك بالكامل لليوم</div>
      <div style="color:${worked>=exp?'var(--success)':'var(--warning)'};font-weight:800;margin-top:8px;font-size:15px;">${worked} من أصل ${exp} ساعة</div>
    </div>`;
  }
  return `
  <div class="card">
    <div class="section-title">بصمة الحضور والانصراف الرقمية</div>
    <p style="font-size:11.5px;color:var(--text-muted);margin-top:-8px;margin-bottom:14px;">${bioReady?'تسجيل الدوام بالتحقق ببصمتك أو Face ID الحقيقي':'تسجيل الدوام مع التحقق من الموقع الجغرافي الفعلي'}</p>
    <div class="welcome-panel">
      <div>أهلًا بك، <b>${u.name}</b></div>
      <div style="color:var(--text-muted);margin-top:4px;">القسم: ${u.department} · الدوام المعتمد: <span dir="ltr">${(u.workStart||'').slice(0,5)} – ${(u.workEnd||'').slice(0,5)}</span></div>
    </div>
    ${body}
    ${bioSupported && !u.hasWebauthn ? `
    <div style="text-align:center;margin-top:14px;padding-top:14px;border-top:1px dashed var(--border);">
      <p style="font-size:11.5px;color:var(--text-muted);margin-bottom:8px;">فعّل البصمة الرقمية لجهازك عشان تسجيل الدوام يصير أسرع وأأمن</p>
      <button class="btn btn-ghost btn-sm" id="registerBioBtn">🔒 تفعيل البصمة الرقمية</button>
    </div>` : ''}
    ${u.hasWebauthn ? `<p style="text-align:center;font-size:10.5px;color:var(--success);margin-top:10px;">🔒 البصمة الرقمية مفعّلة على هذا الحساب</p>` : ''}
  </div>`;
}

function empTasks(){
  const myTasks = state.tasks.filter(t=>t.assignees.some(a=>a.userId===state.currentUser.id));
  return `${myTasks.length===0?`<div class="card"><div class="empty">لا توجد مهام مسندة إليك حاليًا</div></div>`:myTasks.map(t=>taskCard(t,false)).join('')}`;
}

function empAttendance(){
  const mine = state.attendance.filter(a=>a.userId===state.currentUser.id).sort((a,b)=>b.date.localeCompare(a.date));
  const exp = expectedHours(state.currentUser);
  const myLeaves = (state.leaveRequests||[]).slice().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const leaveStatusMap = {pending:['قيد المراجعة','badge-warning'], approved:['موافَق عليها','badge-success'], rejected:['مرفوضة','badge-danger']};
  return `
  <div class="card" style="margin-bottom:16px;">
    <div class="section-title">طلبات إجازتي <button class="btn btn-primary btn-sm" id="openLeaveModal">+ طلب إجازة</button></div>
    ${myLeaves.length===0?`<div class="empty">ما في طلبات إجازة قدّمتها بعد</div>`:`
    <table><thead><tr><th>من</th><th>إلى</th><th>السبب</th><th>الحالة</th></tr></thead><tbody>
    ${myLeaves.map(l=>{ const [label,cls] = leaveStatusMap[l.status];
      return `<tr><td>${fmtDate(l.startDate)}</td><td>${fmtDate(l.endDate)}</td><td style="color:var(--text-muted);font-size:12px;">${l.reason||'—'}</td><td><span class="badge ${cls}">${label}</span></td></tr>`;
    }).join('')}
    </tbody></table>`}
  </div>
  <div class="card">
    <div class="section-title">سجل دوامي <span style="font-size:11px;color:var(--text-faint);font-weight:600;">دوامك المطلوب: ${exp} ساعة يوميًا</span></div>
    ${mine.length===0?`<div class="empty">لا يوجد سجل دوام بعد</div>`:`
    <table><thead><tr><th>التاريخ</th><th>الحضور</th><th>الانصراف</th><th>ساعات العمل</th><th>الحالة</th></tr></thead><tbody>
    ${mine.map(a=>{
      const worked = hoursDiff(a.checkIn, a.checkOut);
      const hoursTxt = a.checkOut ? `<span style="color:${worked>=exp?'var(--success)':'var(--warning)'};font-weight:700;">${worked}س${worked<exp?' ⚠️':' ✅'}</span>` : '—';
      return `<tr><td>${fmtDate(a.date)}</td><td>${a.checkIn||'—'}</td><td>${a.checkOut||'—'}</td><td>${hoursTxt}</td><td>${statusBadge(a.status)}</td></tr>`;
    }).join('')}
    </tbody></table>`}
  </div>`;
}

function leaveModal(){
  return `<div class="modal-bg" id="leaveModalBg"><div class="modal">
    <h3 class="modal-title">طلب إجازة جديد</h3>
    <form id="leaveForm">
      <div class="form-row">
        <div class="field"><label>من تاريخ</label><input name="startDate" type="date" required/></div>
        <div class="field"><label>إلى تاريخ</label><input name="endDate" type="date" required/></div>
      </div>
      <div class="field"><label>السبب (اختياري)</label><textarea name="reason" rows="2" style="width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface-2);font-family:inherit;"></textarea></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="closeLeaveModal" style="flex:1;">إلغاء</button>
        <button type="submit" class="btn btn-primary" style="flex:1;">إرسال الطلب</button>
      </div>
    </form>
  </div></div>`;
}

function empPoints(){
  const rank = leaderboard();
  const myRank = rank.findIndex(r=>r.u.id===state.currentUser.id)+1;
  const myHistory = state.points.filter(p=>p.userId===state.currentUser.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
  return `
  <div class="grid grid-2">
    <div class="card" style="text-align:center;">
      <div class="stat-label">ترتيبك في الفريق</div>
      <div class="stat-value" style="font-size:36px;color:var(--accent);">#${myRank||'-'}</div>
      <div class="stat-sub">من أصل ${rank.length} موظف</div>
    </div>
    <div class="card" style="text-align:center;">
      <div class="stat-label">إجمالي النقاط</div>
      <div class="stat-value" style="font-size:36px;color:var(--primary);">${userPoints(state.currentUser.id)}</div>
    </div>
  </div>
  <div class="card" style="margin-top:16px;">
    <div class="section-title">سجل النقاط</div>
    ${myHistory.length===0?`<div class="empty">لا يوجد سجل بعد</div>`:myHistory.map(p=>`
      <div class="assignee-row"><span>${p.reason}</span><b style="color:${p.points>=0?'var(--success)':'var(--danger)'}">${p.points>0?'+':''}${p.points}</b></div>
    `).join('')}
  </div>`;
}

function empReport(){
  const r = monthlyReport(state.currentUser.id);
  const shortfall = r.totalHours < r.requiredHours;
  return `
  <div class="grid grid-4">
    <div class="card stat-card"><div class="stat-label">أيام الحضور</div><div class="stat-value" style="color:var(--success)">${r.present}</div></div>
    <div class="card stat-card"><div class="stat-label">أيام التأخير</div><div class="stat-value" style="color:var(--warning)">${r.late}</div></div>
    <div class="card stat-card"><div class="stat-label">ساعات العمل الفعلية</div><div class="stat-value" style="color:${shortfall?'var(--warning)':'var(--success)'}">${r.totalHours}<span style="font-size:13px;color:var(--text-faint);"> / ${r.requiredHours}س</span></div></div>
    <div class="card stat-card"><div class="stat-label">نقاط الشهر</div><div class="stat-value" style="color:var(--primary)">${r.points}</div></div>
  </div>
  <div class="card" style="margin-top:16px;">
    <div class="section-title">المهام هذا الشهر</div>
    <p style="font-size:14px;color:var(--text-muted);">أنجزت <b style="color:var(--text)">${r.completed}</b> من أصل <b style="color:var(--text)">${r.totalTasks}</b> مهمة مسندة إليك${r.late_tasks?`، منها <b style="color:var(--danger)">${r.late_tasks}</b> متأخرة عن الموعد.`:'.'}</p>
  </div>`;
}

/* ---------------- EVENT WIRING ---------------- */
function attachAppEvents(){
  document.getElementById('logoutBtn')?.addEventListener('click', handleLogout);
  document.getElementById('hamburgerBtn')?.addEventListener('click', ()=>{ state.mobileMenuOpen = !state.mobileMenuOpen; render(); });
  document.getElementById('mobileOverlay')?.addEventListener('click', ()=>{ state.mobileMenuOpen = false; render(); });
  document.querySelectorAll('[data-tab]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const tab = el.getAttribute('data-tab');
      if(state.currentUser.role==='admin') state.adminTab = tab; else state.empTab = tab;
      state.mobileMenuOpen = false;
      render();
    });
  });
  document.getElementById('openEmpModal')?.addEventListener('click', ()=>{ state.empModal=true; render(); });
  document.getElementById('closeEmpModal')?.addEventListener('click', ()=>{ state.empModal=false; render(); });
  document.getElementById('empModalBg')?.addEventListener('click', (e)=>{ if(e.target.id==='empModalBg'){ state.empModal=false; render(); }});
  document.getElementById('empForm')?.addEventListener('submit', handleAddEmployee);

  document.querySelectorAll('[data-edit-schedule]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.scheduleModal = el.getAttribute('data-edit-schedule'); render(); });
  });
  document.getElementById('closeScheduleModal')?.addEventListener('click', ()=>{ state.scheduleModal=null; render(); });
  document.getElementById('scheduleModalBg')?.addEventListener('click', (e)=>{ if(e.target.id==='scheduleModalBg'){ state.scheduleModal=null; render(); }});
  document.getElementById('scheduleForm')?.addEventListener('submit', handleUpdateSchedule);

  document.getElementById('openClientModal')?.addEventListener('click', ()=>{ state.clientModal=true; render(); });
  document.getElementById('closeClientModal')?.addEventListener('click', ()=>{ state.clientModal=false; render(); });
  document.getElementById('clientModalBg')?.addEventListener('click', (e)=>{ if(e.target.id==='clientModalBg'){ state.clientModal=false; render(); }});
  document.getElementById('clientForm')?.addEventListener('submit', handleAddClient);
  document.querySelectorAll('[data-remove-client]').forEach(el=>{
    el.addEventListener('click', ()=> handleRemoveClient(el.getAttribute('data-remove-client')));
  });

  document.getElementById('openDepartmentModal')?.addEventListener('click', ()=>{ state.departmentModal=true; render(); });
  document.getElementById('closeDepartmentModal')?.addEventListener('click', ()=>{ state.departmentModal=false; render(); });
  document.getElementById('departmentModalBg')?.addEventListener('click', (e)=>{ if(e.target.id==='departmentModalBg'){ state.departmentModal=false; render(); }});
  document.getElementById('departmentForm')?.addEventListener('submit', handleAddDepartment);
  document.querySelectorAll('[data-remove-department]').forEach(el=>{
    el.addEventListener('click', ()=> handleRemoveDepartment(el.getAttribute('data-remove-department')));
  });
  document.querySelectorAll('[data-reports-tab]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.reportsTab = el.getAttribute('data-reports-tab'); render(); });
  });
  document.querySelectorAll('[data-report-preset]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const preset = el.getAttribute('data-report-preset');
      state.reportFilter.preset = preset;
      if(preset==='custom' && !state.reportFilter.from){
        state.reportFilter.from = todayStr(); state.reportFilter.to = todayStr();
      }
      render();
    });
  });
  document.getElementById('applyReportRange')?.addEventListener('click', ()=>{
    const from = document.getElementById('reportFromInput').value;
    const to = document.getElementById('reportToInput').value;
    if(!from || !to){ showToast('حدد التاريخين'); return; }
    if(to < from){ showToast('تاريخ النهاية يجب أن يكون بعد البداية'); return; }
    state.reportFilter.from = from; state.reportFilter.to = to;
    render();
  });

  document.getElementById('openTaskModal')?.addEventListener('click', openTaskModal);
  document.getElementById('quickCreateTaskBtn')?.addEventListener('click', openTaskModal);
  document.getElementById('closeTaskModal')?.addEventListener('click', ()=>{ state.taskModal=false; render(); });
  document.getElementById('taskForm')?.addEventListener('submit', handleCreateTask);

  const clientInput = document.getElementById('clientNameInput');
  const clientDropdown = document.getElementById('clientSuggestions');
  if(clientInput && clientDropdown){
    const renderSuggestions = ()=>{
      const q = clientInput.value.trim().toLowerCase();
      const matches = (state.clients||[]).filter(c=>c.name.toLowerCase().includes(q));
      if(!q){ clientDropdown.classList.remove('show'); clientDropdown.innerHTML=''; return; }
      let html = matches.slice(0,6).map(c=>`<div class="combo-item" data-pick-client="${c.name}">${c.name}</div>`).join('');
      const exact = matches.some(c=>c.name.toLowerCase()===q);
      if(!exact) html += `<div class="combo-item combo-item-new" data-pick-client="${clientInput.value.trim()}">+ إضافة "${clientInput.value.trim()}" كشركة جديدة</div>`;
      clientDropdown.innerHTML = html;
      clientDropdown.classList.add('show');
    };
    clientInput.addEventListener('input', renderSuggestions);
    clientInput.addEventListener('focus', renderSuggestions);
    clientInput.addEventListener('blur', ()=> setTimeout(()=>clientDropdown.classList.remove('show'), 150));
    clientDropdown.addEventListener('mousedown', (e)=>{
      const item = e.target.closest('[data-pick-client]');
      if(!item) return;
      clientInput.value = item.getAttribute('data-pick-client');
      clientDropdown.classList.remove('show');
    });
  }
  document.querySelectorAll('[data-assignee-chip]').forEach(el=>{
    el.addEventListener('click', ()=> toggleAssignee(el.getAttribute('data-assignee-chip'), el));
  });

  document.querySelectorAll('[data-remove-emp]').forEach(el=>{
    el.addEventListener('click', ()=> handleRemoveEmployee(el.getAttribute('data-remove-emp')));
  });
  document.querySelectorAll('[data-mark-absent]').forEach(el=>{
    el.addEventListener('click', ()=>{ const [uid,d] = el.getAttribute('data-mark-absent').split('|'); markAbsent(uid,d); });
  });

  document.getElementById('openLeaveModal')?.addEventListener('click', ()=>{ state.leaveModal=true; render(); });
  document.getElementById('closeLeaveModal')?.addEventListener('click', ()=>{ state.leaveModal=false; render(); });
  document.getElementById('leaveModalBg')?.addEventListener('click', (e)=>{ if(e.target.id==='leaveModalBg'){ state.leaveModal=false; render(); }});
  document.getElementById('leaveForm')?.addEventListener('submit', handleRequestLeave);
  document.querySelectorAll('[data-review-leave]').forEach(el=>{
    el.addEventListener('click', ()=>{ const [id,status] = el.getAttribute('data-review-leave').split('|'); handleReviewLeave(id,status); });
  });
  document.querySelectorAll('[data-toggle-assignee]').forEach(el=>{
    el.addEventListener('click', ()=>{ const [tid,uid] = el.getAttribute('data-toggle-assignee').split('|'); toggleAssigneeDone(tid,uid); });
  });

  document.getElementById('checkInBtn')?.addEventListener('click', checkIn);
  document.getElementById('checkOutBtn')?.addEventListener('click', checkOut);
  document.getElementById('bioAttendBtn')?.addEventListener('click', verifyBiometricAndAttend);
  document.getElementById('registerBioBtn')?.addEventListener('click', registerBiometric);

  document.getElementById('waForm')?.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const f = e.target;
    const res = await apiPost('updateWhatsappUrl', { phoneId: f.phoneId.value.trim(), token: f.token.value.trim(), template: f.template.value.trim() });
    if(res.error){ showToast(res.error); return; }
    await refresh();
    showToast('تم حفظ إعدادات واتساب');
  });
  document.getElementById('waTestBtn')?.addEventListener('click', async ()=>{
    const phone = document.getElementById('waTestPhone').value.trim();
    if(!phone){ showToast('اكتب رقم هاتف أولًا'); return; }
    const res = await apiPost('testWhatsapp', { phone });
    if(res.error){ showToast(res.error); return; }
    showToast('تم إرسال طلب الرسالة، تحقق من واتساب خلال ثوانٍ');
  });

  document.getElementById('settingsForm')?.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const f = e.target;
    const res = await apiPost('updateSettings', {
      workStart: f.workStart.value, graceMinutes:+f.graceMinutes.value,
      pointsOnTime:+f.pointsOnTime.value, pointsEarlyBonus:+f.pointsEarlyBonus.value,
      pointsAttendance:+f.pointsAttendance.value, penaltyLate:+f.penaltyLate.value, penaltyAbsent:+f.penaltyAbsent.value
    });
    if(res.error){ showToast(res.error); return; }
    await refresh();
    showToast('تم حفظ قواعد النقاط');
  });

  if(state.currentUser.role==='admin' && state.adminTab==='dashboard'){
    setTimeout(renderDashboardCharts, 0);
  }
}

init();
</script>
</body>
</html>
